[project]
name = "nichefinder-db"
version = "0.1.0"
description = "Database models and migrations for AI Nichefinder."
requires-python = ">=3.12,<3.15"
dependencies = [
  "alembic>=1.16.0",
  "nichefinder-core",
  "sqlmodel>=0.0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nichefinder_db"]

[tool.uv.sources]
nichefinder-core = { workspace = true }
