[project]
name = "nichefinder-core"
version = "0.1.0"
description = "Core models and services for AI Nichefinder."
requires-python = ">=3.12,<3.15"
dependencies = [
  "httpx>=0.28.1",
  "pydantic>=2.11.0",
  "pydantic-settings>=2.8.0",
  "tenacity>=9.1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nichefinder_core"]

